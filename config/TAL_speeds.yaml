
test_name: "TAL_speeds"

architecture: "fast"
n_scans: 2
train_mode: "Std"
test_mode: "Std"

n: 4
set_n: 1

random_seed: 10000

# Noise for robust training: position uncertainty + LIDAR sensor noise
noise_std: 0.1        # Gaussian noise on x,y position estimate (metres)
lidar_noise_std: 0.05 # Gaussian noise on LIDAR range readings (metres)

n_train_steps: 100000
n_test_laps: 20
# n_test_laps: 50

map_name: "f1_esp"
reward: "TAL"

runs:
  - max_speed: 4
  - max_speed: 5
  - max_speed: 6
  - max_speed: 7
  # - max_speed: 8







